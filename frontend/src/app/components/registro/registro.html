<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);">

  <div class="card border-0 p-4"
       style="width: 100%; max-width: 420px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);">

    <!-- Icono -->
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
           style="width: 70px; height: 70px; background: linear-gradient(135deg, #4f46e5, #7c3aed);">
        <i class="bi bi-person-plus-fill text-white" style="font-size: 1.8rem;"></i>
      </div>
      <h4 class="fw-bold mb-1" style="color: #1e293b;">Crear Cuenta</h4>
      <p class="text-muted small">Únete al sistema de gestión</p>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="ejecutarRegistro()" #registroForm="ngForm" autocomplete="off">

      <div class="mb-3">
        <label class="form-label fw-semibold small text-secondary">
          <i class="bi bi-person me-1"></i>Nombre Completo
        </label>
        <input type="text"
               name="nombre"
               [(ngModel)]="nuevoUsuario.nombre"
               required
               class="form-control form-control-lg"
               style="border-radius: 10px; border: 1.5px solid #e2e8f0;"
               placeholder="Tu nombre completo">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold small text-secondary">
          <i class="bi bi-envelope me-1"></i>Correo Electrónico
        </label>
        <input type="email"
               name="correo"
               [(ngModel)]="nuevoUsuario.correo"
               required
               class="form-control form-control-lg"
               style="border-radius: 10px; border: 1.5px solid #e2e8f0;"
               placeholder="correo@ejemplo.com">
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold small text-secondary">
          <i class="bi bi-lock me-1"></i>Contraseña
        </label>
        <input type="password"
               name="password"
               [(ngModel)]="nuevoUsuario.password"
               required
               autocomplete="new-password"
               class="form-control form-control-lg"
               style="border-radius: 10px; border: 1.5px solid #e2e8f0;"
               placeholder="••••••••">
      </div>

      <button type="submit"
              [disabled]="!registroForm.form.valid"
              class="btn w-100 btn-lg fw-semibold text-white"
              style="background: linear-gradient(135deg, #4f46e5, #7c3aed);
                     border: none; border-radius: 10px; padding: 12px;">
        <i class="bi bi-person-check me-2"></i>Registrarse
      </button>

    </form>

    <!-- Link login -->
    <p class="text-center mt-4 mb-0 small text-muted">
      ¿Ya tienes cuenta?
      <a routerLink="/login"
         class="fw-semibold text-decoration-none"
         style="color: #4f46e5;">
        Inicia sesión aquí
      </a>
    </p>

  </div>
</div>
