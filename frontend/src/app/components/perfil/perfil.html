<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background: #f8fafc;">

  <div class="card border-0 p-4"
       style="width: 100%; max-width: 480px; border-radius: 20px;
              box-shadow: 0 4px 24px rgba(79, 70, 229, 0.10);">

    <!-- Header -->
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
           style="width: 80px; height: 80px; background: linear-gradient(135deg, #4f46e5, #7c3aed);">
        <i class="bi bi-person-fill text-white" style="font-size: 2rem;"></i>
      </div>
      <h4 class="fw-bold mb-1" style="color: #1e293b;">Mi Perfil</h4>
      <span class="badge px-3 py-2"
            [style.background]="usuario.rol === 'Admin' ? '#ede9fe' :
                               usuario.rol === 'Editor' ? '#fef3c7' : '#dcfce7'"
            [style.color]="usuario.rol === 'Admin' ? '#6d28d9' :
                           usuario.rol === 'Editor' ? '#d97706' : '#16a34a'">
        <i class="bi bi-shield-check me-1"></i>{{ usuario.rol }}
      </span>
    </div>

    <hr style="opacity: 0.1;">

    <!-- Vista de datos -->
    <div *ngIf="!editando" class="mt-3">

      <div class="d-flex align-items-center p-3 mb-3 rounded-3"
           style="background: #f8fafc; border: 1.5px solid #e2e8f0;">
        <div class="d-flex align-items-center justify-content-center rounded-circle me-3"
             style="width: 42px; height: 42px; background: #ede9fe;">
          <i class="bi bi-person-fill" style="color: #6d28d9;"></i>
        </div>
        <div>
          <small class="text-muted d-block" style="font-size: 0.75rem;">Nombre</small>
          <span class="fw-semibold" style="color: #1e293b;">{{ usuario.nombre }}</span>
        </div>
      </div>

      <div class="d-flex align-items-center p-3 mb-4 rounded-3"
           style="background: #f8fafc; border: 1.5px solid #e2e8f0;">
        <div class="d-flex align-items-center justify-content-center rounded-circle me-3"
             style="width: 42px; height: 42px; background: #ede9fe;">
          <i class="bi bi-envelope-fill" style="color: #6d28d9;"></i>
        </div>
        <div>
          <small class="text-muted d-block" style="font-size: 0.75rem;">Correo</small>
          <span class="fw-semibold" style="color: #1e293b;">{{ usuario.correo }}</span>
        </div>
      </div>

      <button (click)="editando = true"
              class="btn w-100 btn-lg fw-semibold text-white mb-2"
              style="background: linear-gradient(135deg, #4f46e5, #7c3aed);
                     border: none; border-radius: 10px; padding: 12px;">
        <i class="bi bi-pencil-fill me-2"></i>Editar Perfil
      </button>

      <a *ngIf="usuario.rol === 'Admin' || usuario.rol === 'Editor'"
         routerLink="/admin"
         class="btn w-100 btn-lg fw-semibold text-white mb-2"
         style="background: linear-gradient(135deg, #7c3aed, #9333ea);
                border: none; border-radius: 10px; padding: 12px;
                text-decoration: none; display: block; text-align: center;">
        <i class="bi bi-speedometer2 me-2"></i>
        {{ usuario.rol === 'Admin' ? 'Panel de Administrador' : 'Panel de Editor' }}
      </a>

      <button (click)="cerrarSesion()"
              class="btn w-100 btn-lg fw-semibold"
              style="background: #fee2e2; color: #dc2626;
                     border: none; border-radius: 10px; padding: 12px;">
        <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
      </button>
    </div>

    <!-- Formulario edición -->
    <div *ngIf="editando" class="mt-3">

      <div class="mb-3">
        <label class="form-label fw-semibold small text-secondary">
          <i class="bi bi-person me-1"></i>Nombre
        </label>
        <input type="text"
               [(ngModel)]="usuario.nombre"
               class="form-control form-control-lg"
               style="border-radius: 10px; border: 1.5px solid #e2e8f0;">
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold small text-secondary">
          <i class="bi bi-envelope me-1"></i>Correo
        </label>
        <input type="email"
               [(ngModel)]="usuario.correo"
               class="form-control form-control-lg"
               style="border-radius: 10px; border: 1.5px solid #e2e8f0;">
      </div>

      <button (click)="guardar()"
              class="btn w-100 btn-lg fw-semibold text-white mb-2"
              style="background: linear-gradient(135deg, #059669, #10b981);
                     border: none; border-radius: 10px; padding: 12px;">
        <i class="bi bi-check-circle-fill me-2"></i>Confirmar Cambios
      </button>

      <button (click)="editando = false"
              class="btn w-100 btn-lg fw-semibold"
              style="background: #f1f5f9; color: #64748b;
                     border: none; border-radius: 10px; padding: 12px;">
        <i class="bi bi-x-circle me-2"></i>Cancelar
      </button>
    </div>

  </div>
</div>
